spring:
  application:
    name: product-service
server:
  port: 8081
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
spring:
  datasource:
    url: jdbc:h2:mem:product-service_db
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

resilience4j:
  ratelimiter:
    instances:
      productApi:
        limitForPeriod: 5
        limitRefreshPeriod: 10s
        timeoutDuration: 0
